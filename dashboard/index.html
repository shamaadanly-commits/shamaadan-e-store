<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shamaadan — Admin Dashboard</title>
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.49.1"
    }
  }
  </script>
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --surface-2: #232018;
      --border: rgb(235 230 220 / 10%);
      --text: #e8e3d9;
      --muted: #a89f92;
      --gold: #c9a84c;
      --profit: #5cb87a;
      --warn: #d4846a;
      --danger: #c45c5c;
      --radius: 10px;
      --font: system-ui, -apple-system, "Segoe UI", sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgb(201 168 76 / 10%) 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
    }

    .shell { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .brand h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
    }
    .brand p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.9rem; }
    .actions { display: flex; gap: 0.5rem; align-items: center; }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms var(--ease), transform 150ms var(--ease);
    }
    .btn:hover { background: #2c2822; }
    .btn:active { transform: scale(0.98); }
    .btn--primary { background: var(--gold); color: #1a1508; border-color: transparent; }
    .btn--ghost { background: transparent; }

    .status {
      margin: 0 0 1rem;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status[data-tone="ok"] { color: var(--profit); }
    .status[data-tone="error"] { color: var(--danger); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .metric__label { margin: 0; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .metric__value { margin: 0.35rem 0 0; font-size: 1.25rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .metric__value--profit { color: var(--profit); }
    .metric__value--warn { color: var(--warn); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      overflow: hidden;
    }
    .panel__head {
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }
    .panel__head h2 { margin: 0; font-size: 1rem; font-weight: 700; }

    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td {
      padding: 0.85rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .table th {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 600;
    }
    .table tbody tr:hover { background: rgb(255 255 255 / 2%); }
    .muted { color: var(--muted); font-size: 0.8rem; margin-top: 0.15rem; }
    .input {
      width: 7rem;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    .stock {
      display: inline-block;
      min-width: 2rem;
      text-align: center;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .stock.is-ok { background: rgb(92 184 122 / 15%); color: var(--profit); }
    .stock.is-low { background: rgb(212 132 106 / 15%); color: var(--warn); }
    .stock.is-out { background: rgb(196 92 92 / 15%); color: var(--danger); text-transform: uppercase; letter-spacing: 0.03em; font-size: 0.72rem; }
    .actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .empty { padding: 2rem; text-align: center; color: var(--muted); }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 800px) {
      .table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <h1>Shamaadan Dashboard</h1>
        <p>Analytics · cost tracking · profit margins · inventory</p>
      </div>
      <div class="actions">
        <a class="btn btn--ghost" href="/pos/">Open POS</a>
        <button type="button" class="btn btn--primary" data-refresh>Refresh</button>
      </div>
    </header>

    <p class="status" data-status>Connecting…</p>
    <section class="metrics" data-metrics aria-label="Store metrics"></section>

    <section class="panel" aria-label="Inventory and pricing">
      <div class="panel__head">
        <h2>Inventory &amp; pricing</h2>
        <span class="muted">Edit wholesale / retail, then Save</span>
      </div>
      <div data-products></div>
    </section>
  </div>

  <script>window.__ENV__ = window.__ENV__ || {};</script>
  <script src="/api/env.js"></script>
  <script type="module" src="./dashboard.js"></script>
</body>
</html>
