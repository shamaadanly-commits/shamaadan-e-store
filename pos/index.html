<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shamaadan — POS</title>
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.49.1"
    }
  }
  </script>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --blue: #2563eb;
      --green: #16a34a;
      --danger: #dc2626;
      --topbar: #1f2937;
      --radius: 12px;
      --font: system-ui, -apple-system, "Segoe UI", sans-serif;
      --ticket-w: min(380px, 40vw);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
    }

    .pos {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.7rem 1rem;
      background: var(--topbar);
      color: #fff;
    }
    .topbar__brand { font-weight: 800; letter-spacing: 0.02em; }
    .topbar a {
      color: #fbbf24;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .status {
      margin: 0;
      padding: 0.55rem 1rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
    .status[data-tone="ok"] { color: var(--green); }
    .status[data-tone="error"] { color: var(--danger); }

    .workspace {
      display: grid;
      grid-template-columns: 1fr var(--ticket-w);
      min-height: 0;
    }

    .catalog {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      padding: 0.85rem;
      gap: 0.75rem;
    }

    .search {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      background: var(--surface);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.65rem;
      overflow: auto;
      align-content: start;
      padding-bottom: 1rem;
    }

    .product {
      display: grid;
      gap: 0.25rem;
      text-align: left;
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font: inherit;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .product:hover:not(:disabled) {
      box-shadow: 0 8px 20px rgb(0 0 0 / 8%);
      transform: translateY(-1px);
    }
    .product:active:not(:disabled) { transform: scale(0.98); }
    .product:disabled, .product.is-out { opacity: 0.55; cursor: not-allowed; }
    .product__name { font-weight: 700; font-size: 0.92rem; }
    .product__price { color: var(--blue); font-weight: 800; }
    .product__stock { color: var(--muted); font-size: 0.75rem; }

    .ticket {
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-left: 1px solid var(--border);
      background: var(--surface);
      min-height: 0;
    }
    .ticket__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .ticket__head h2 { margin: 0; font-size: 1.05rem; }
    .ticket__count { margin: 0.15rem 0 0; color: var(--muted); font-size: 0.8rem; }

    .lines {
      overflow: auto;
      padding: 0.75rem;
    }
    .empty-ticket {
      height: 100%;
      display: grid;
      place-content: center;
      text-align: center;
      color: var(--muted);
      gap: 0.25rem;
    }
    .empty-ticket p { margin: 0; font-weight: 700; color: var(--text); }

    .line {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.65rem;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .line__name { margin: 0; font-weight: 700; font-size: 0.9rem; }
    .line__meta { margin: 0.1rem 0 0; color: var(--muted); font-size: 0.75rem; }
    .line__controls {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--bg);
      border-radius: 8px;
      padding: 0.15rem;
    }
    .line__controls button {
      width: 1.75rem;
      height: 1.75rem;
      border: 0;
      border-radius: 6px;
      background: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .footer {
      padding: 1rem;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 0.55rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .row--total {
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 800;
    }
    .charge {
      width: 100%;
      min-height: 3.25rem;
      border: 0;
      border-radius: 10px;
      background: var(--green);
      color: #fff;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
    }
    .charge:disabled { opacity: 0.45; cursor: not-allowed; }
    .clear {
      border: 0;
      background: transparent;
      color: var(--danger);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .empty { padding: 2rem; text-align: center; color: var(--muted); }

    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 45%; }
      .ticket { border-left: 0; border-top: 1px solid var(--border); }
      :root { --ticket-w: 100%; }
    }
  </style>
</head>
<body>
  <div class="pos">
    <header class="topbar">
      <span class="topbar__brand">Shamaadan POS</span>
      <a href="/dashboard/">Dashboard</a>
    </header>

    <p class="status" data-status>Connecting…</p>

    <div class="workspace">
      <section class="catalog" aria-label="Product selection">
        <input class="search" type="search" placeholder="Search products…" data-search aria-label="Search products">
        <div class="grid" data-grid></div>
      </section>

      <aside class="ticket" aria-label="Transaction totalizer">
        <div class="ticket__head">
          <div>
            <h2>Ticket</h2>
            <p class="ticket__count" data-count>Empty</p>
          </div>
          <button type="button" class="clear" data-clear>Clear</button>
        </div>
        <div class="lines" data-ticket></div>
        <footer class="footer">
          <div class="row">
            <span>Subtotal</span>
            <span data-subtotal>0.00 LYD</span>
          </div>
          <div class="row row--total">
            <span>Total</span>
            <span data-total>0.00 LYD</span>
          </div>
          <button type="button" class="charge" data-charge disabled>CHARGE</button>
        </footer>
      </aside>
    </div>
  </div>

  <script>window.__ENV__ = window.__ENV__ || {};</script>
  <script src="/api/env.js"></script>
  <script type="module" src="./pos.js"></script>
</body>
</html>
